<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>playing with layouts</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <!-- experimenting with float and without it -->
    <h3>Float layout</h3>
    <div class="container float">
      <div class="box" id="box1"></div>
      <div class="box" id="box2"></div>
      <div class="box" id="box3"></div>
      <div class="box" id="box1"></div>
      <div class="box" id="box2"></div>
      <div class="box" id="box3"></div>
      <div class="box" id="box1"></div>
      <div class="box" id="box2"></div>
      <div class="box" id="box3"></div>
      <div class="box" id="box1"></div>
      <div class="box" id="box2"></div>
      <div class="box" id="box3"></div>
      <div class="box" id="box1"></div>
      <div class="box" id="box2"></div>
      <div class="box" id="box3"></div>
      <div class="box" id="box1"></div>
      <div class="box" id="box2"></div>
      <div class="box" id="box3"></div>
    </div>

    <!-- experimenting with flex box -->
    <h3>Flex box layout</h3>
    <div class="container flex">
      <div class="boxflex" id="box1"></div>
      <div class="boxflex" id="box2"></div>
      <div class="boxflex" id="box3"></div>
      <div class="boxflex" id="box1"></div>
      <div class="boxflex" id="box2"></div>
      <div class="boxflex" id="box3"></div>
      <div class="boxflex" id="box1"></div>
      <div class="boxflex" id="box2"></div>
      <div class="boxflex" id="box3"></div>
    </div>

  </body>
</html>
